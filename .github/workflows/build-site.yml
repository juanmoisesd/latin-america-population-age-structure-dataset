name: Build & publish site

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate dataset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate dataset
        run: python scripts/validate_dataset.py
        continue-on-error: true

  build:
    name: Build and publish site
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build indicators
        run: python scripts/build_indicators.py

      - name: Build atlas data
        run: python scripts/build_atlas_data.py

      - name: Build site pages
        run: python scripts/build_site.py

      - name: Generate research pages
        run: python scripts/generate_research_pages.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --cached --quiet || git commit -m "chore: regenerar sitio [skip ci]"
          git push
